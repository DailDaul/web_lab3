{% extends 'base.html' %}

{% block title %}Авторизация{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Форма авторизации</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('request_info') }}">
                    <div class="mb-3">
                        <label for="username" class="form-label">Имя пользователя</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Пароль</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Войти</button>
                    <a href="{{ url_for('request_info') }}" class="btn btn-secondary">Отмена</a>
                </form>
            </div>
            <div class="card-footer text-muted">
                <small>Данные будут отправлены методом POST и отобразятся на вкладке "Данные формы"</small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
